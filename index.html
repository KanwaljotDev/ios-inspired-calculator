            <div class="calculator-body">
                <div class="row-one">
                    <button id="clear-btn" class="function">AC</button>
                    <button id="sign-btn"  class="function">+/-</button>
                    <button id="modulo-btn"class="function">%</button>

                </div>
                
                <div class="row-five">

                    <button id="decimal-btn" class="numpad">.</button>
